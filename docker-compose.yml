version: "3.8"

services:
  rules-engine:
    build: .
    container_name: rules_redtrack
    restart: always
    ports:
      - "8001:8001"
    volumes:
      - rules_data:/app/data
    environment:
      - DB_PATH=/app/data/dashboard.db
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8001/')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  rules_data:
